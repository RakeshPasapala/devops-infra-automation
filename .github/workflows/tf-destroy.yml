name: terraform-destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: github.event.inputs.confirm == 'DESTROY'
    runs-on: ubuntu-latest
    environment: main # manual approval on dev env
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Write backend config
        working-directory: terraform
        shell: bash
        run: |
          cat > backend.hcl <<'EOF'
          resource_group_name  = "${{ vars.BACKEND_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.BACKEND_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.BACKEND_CONTAINER_NAME }}"
          key                  = "${{ vars.BACKEND_KEY }}"
          use_azuread_auth     = true
          EOF

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_INPUT: false
          TF_IN_AUTOMATION: true
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -reconfigure -backend-config=backend.hcl

      - name: Terraform Destroy
        working-directory: terraform
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform destroy -auto-approve
